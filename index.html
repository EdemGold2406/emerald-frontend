<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emerald Field School</title>
    <!-- Import Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: { 
          extend: { 
            fontFamily: { display: ['Oswald', 'sans-serif'], sans: ['Inter', 'sans-serif'] },
            colors: { emeraldGreen: '#008000', emeraldYellow: '#FFD700', darkBase: '#0a0a0a', darkSurface: '#141414', darkBorder: '#2a2a2a' } 
          } 
        }
      }
    </script>
  </head>
  <body class="bg-gray-50 dark:bg-darkBase text-gray-900 dark:text-gray-300 font-sans antialiased selection:bg-emeraldYellow selection:text-black transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
